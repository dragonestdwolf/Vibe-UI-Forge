<!--
  mession-card Template
  Source: benchmark + Pixso MCP section 3195:4124
  Variables (Template Contract):
  - `{{variant}}`: `timing-delta|metric-status|metric-action`
  - `{{state}}`: `default|hover|pressed|focus`
  - `{{icon}}`
  - `{{primaryValue}}`
  - `{{qualifier}}`
  - `{{targetValue}}`
  - `{{title}}`
  - `{{statusLabel}}`
  - `{{actionLabel}}`
  - `{{streakLabel}}`
-->

<style>
:root {
  --harmony-bg-surface: rgba(255, 255, 255, 1);
  --harmony-text-primary: rgba(0, 0, 0, 0.8980392218);
  --harmony-text-secondary: rgba(0, 0, 0, 0.6000000238);
  --harmony-text-tertiary: rgba(0, 0, 0, 0.400000006);
  --harmony-border: rgba(0, 0, 0, 0.08);
  --harmony-pill-bg: rgba(0, 0, 0, 0.05);
  --harmony-pill-text: rgba(0, 0, 0, 0.6);
  --harmony-done-bg: rgba(251, 101, 34, 0.1);
  --harmony-done-text: rgba(245, 101, 34, 1);
  --harmony-alert: rgba(237, 111, 33, 1);
  --harmony-teal: rgba(0, 165, 173, 1);
  --harmony-radius-card: 20px;
  --harmony-radius-pill: 14px;
}

.harmony-mession-card {
  width: 328px;
  min-height: 72px;
  padding: 10px 12px;
  border-radius: var(--harmony-radius-card);
  background: var(--harmony-bg-surface);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  color: var(--harmony-text-primary);
  font-family: "HarmonyOS Sans SC", "HarmonyOS Sans", "Noto Sans SC", sans-serif;
  box-sizing: border-box;
}

.harmony-mession-card-left {
  min-width: 0;
  display: flex;
  align-items: center;
  gap: 16px;
  flex: 1 1 auto;
}

.harmony-mession-card-icon {
  width: 32px;
  height: 32px;
  flex: 0 0 32px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.harmony-mession-card-content {
  min-width: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 2px;
}

.harmony-mession-card-value-row,
.harmony-mession-card-title-row {
  display: flex;
  align-items: center;
  min-width: 0;
  white-space: nowrap;
}

.harmony-mession-card-value-row {
  gap: 2px;
}

.harmony-mession-card-title-row {
  gap: 4px;
}

.harmony-mession-card-primary {
  font-size: 16px;
  line-height: 19px;
  font-weight: 700;
  color: var(--harmony-text-primary);
}

.harmony-mession-card-qualifier,
.harmony-mession-card-target,
.harmony-mession-card-title {
  font-family: "HarmonyHeiTi-Regular", "HarmonyOS Sans SC", "Noto Sans SC", sans-serif;
  font-size: 12px;
  line-height: 16px;
}

.harmony-mession-card-qualifier {
  font-weight: 500;
  color: var(--harmony-alert);
}

.harmony-mession-card-target {
  font-weight: 400;
  color: var(--harmony-text-tertiary);
}

.harmony-mession-card-title {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--harmony-text-primary);
}

.harmony-mession-card-streak {
  max-width: 100%;
  padding: 1px 8px;
  border-radius: 20px;
  background: rgba(253, 146, 62, 0.1);
  color: rgba(253, 151, 62, 1);
  font-family: "HarmonyHeiTi-Regular", "HarmonyOS Sans SC", "Noto Sans SC", sans-serif;
  font-size: 10px;
  line-height: 14px;
  white-space: nowrap;
}

.harmony-mession-card-right {
  flex: 0 0 auto;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  min-width: 72px;
}

.harmony-mession-card-status,
.harmony-mession-card-action {
  min-width: 72px;
  height: 28px;
  padding: 0 8px;
  border-radius: var(--harmony-radius-pill);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  white-space: nowrap;
  border: 0;
  font-size: 14px;
  line-height: 20px;
  font-weight: 500;
  font-family: inherit;
  box-sizing: border-box;
}

.harmony-mession-card-status {
  background: var(--harmony-pill-bg);
  color: var(--harmony-pill-text);
}

.harmony-mession-card-action {
  background: var(--harmony-pill-bg);
  color: var(--harmony-pill-text);
}

.harmony-mession-card-status[data-label="已完成"] {
  background: var(--harmony-done-bg);
  color: var(--harmony-done-text);
}

.harmony-mession-card-status[data-label="待完成"],
.harmony-mession-card-status[data-label="未完成"] {
  background: var(--harmony-pill-bg);
  color: var(--harmony-pill-text);
}

.harmony-mession-card-qualifier[data-label="正常"] {
  color: var(--harmony-teal);
}

.harmony-mession-card-qualifier[data-label="准点"] {
  color: var(--harmony-text-tertiary);
}

.harmony-mession-card-variant-metric-action .harmony-mession-card-value-row {
  gap: 0;
}

.harmony-mession-card-variant-metric-action .harmony-mession-card-qualifier:empty + .harmony-mession-card-target {
  margin-left: 0;
}

.harmony-mession-card-default {}

.harmony-mession-card-hover {}

.harmony-mession-card-pressed {}

.harmony-mession-card-focus {}

.harmony-mession-card [class*="icon"],
.harmony-mession-card [class*="arrow"],
.harmony-mession-card [class*="thumb"] {
  background-repeat: no-repeat;
  background-position: center;
  background-size: contain;
}

.harmony-mession-card-qualifier:empty,
.harmony-mession-card-target:empty,
.harmony-mession-card-streak:empty,
.harmony-mession-card-status:empty,
.harmony-mession-card-action:empty {
  display: none;
}
</style>

<div class="harmony-mession-card harmony-mession-card-variant-{{variant}} harmony-mession-card-{{state}}" data-component="mession-card" data-figma-node-id="">
  <div class="harmony-mession-card-left">
    <div class="harmony-mession-card-icon">{{icon}}</div>
    <div class="harmony-mession-card-content">
      <div class="harmony-mession-card-value-row">
        <span class="harmony-mession-card-primary">{{primaryValue}}</span>
        <span class="harmony-mession-card-qualifier" data-label="{{qualifier}}">{{qualifier}}</span>
        <span class="harmony-mession-card-target">{{targetValue}}</span>
      </div>
      <div class="harmony-mession-card-title-row">
        <span class="harmony-mession-card-title">{{title}}</span>
        <span class="harmony-mession-card-streak">{{streakLabel}}</span>
      </div>
    </div>
  </div>
  <div class="harmony-mession-card-right">
    <span class="harmony-mession-card-status" data-label="{{statusLabel}}">{{statusLabel}}</span>
    <button type="button" class="harmony-mession-card-action">{{actionLabel}}</button>
  </div>
</div>
