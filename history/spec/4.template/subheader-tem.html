<!--
  subheader Template
  Source: benchmark + MCP
  Variables (Template Contract):
- `{{title}}`, `{{subtitle}}`, `{{actionText}}`
- `{{state}}`: `default|disabled`
- `{{actionState}}`: `default|hover|pressed|focus|disabled`
- `{{showAction}}`: 是否显示右侧操作
-->

<style>
:root {
  --harmony-bg-surface: rgba(255, 255, 255, 1);
  --harmony-text-primary: rgba(0, 0, 0, 0.8980392218);
  --harmony-text-secondary: rgba(0, 0, 0, 0.6000000238);
  --harmony-border: rgba(0, 0, 0, 0.08);
  --harmony-brand: rgba(10, 89, 247, 1);
  --harmony-radius-pill: 999px;
  --harmony-checkbox-size: 16px;
  --harmony-size-width: 360px;
  --harmony-size-height: 792px;
  --harmony-size-surface: rgba(241, 243, 245, 1);
  --harmony-divider-color: rgba(0, 0, 0, 0.12);
}

.harmony-subheader {
  width: 328px; min-height: 72px; display: flex; justify-content: space-between; align-items: flex-start;
  color: var(--harmony-text-primary);
  font-family: "HarmonyOS Sans SC", "HarmonyOS Sans", "Noto Sans SC", sans-serif;
  box-sizing: border-box;
}

.harmony-subheader-default { }
.harmony-subheader-disabled {
  opacity: 0.4;
  pointer-events: none;
}

.harmony-subheader-action-default { }
.harmony-subheader-action-hover { }
.harmony-subheader-action-pressed { }
.harmony-subheader-action-focus { }
.harmony-subheader-action-disabled {
  opacity: 0.4;
  pointer-events: none;
}

/* 防拉伸约束 */
.harmony-subheader [class*="icon"],
.harmony-subheader [class*="arrow"],
.harmony-subheader [class*="thumb"] {
  background-repeat: no-repeat;
  background-position: center;
  background-size: contain;
}
</style>

<div class="harmony-subheader harmony-subheader-{{state}}" data-component="subheader" data-figma-node-id="">
<div class="harmony-subheader-left">
  <h3 class="harmony-subheader-title">{{title}}</h3>
  <p class="harmony-subheader-subtitle">{{subtitle}}</p>
</div>
<button class="harmony-subheader-action harmony-subheader-action-{{actionState}}" type="button" {{showAction}}>{{actionText}}</button>
</div>
