<!--
  button Template
  Source: benchmark + MCP
  Variables (Template Contract):
- `{{variant}}`: `emphasized|normal|warning|text`
- `{{state}}`: `enabled|hover|pressed|focus|loading|disabled`
- `{{icon}}`, `{{label}}`, `{{showSpinner}}`, `{{disabled}}`
-->

<style>
.harmony-button {
  min-height: 32px;
  padding: 0 12px;
  border-radius: 999px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--harmony-font_primary);
  font-family: "HarmonyOS Sans SC", "HarmonyOS Sans", "Noto Sans SC", sans-serif;
  box-sizing: border-box;
}

.harmony-button-enabled { }
.harmony-button-hover { }
.harmony-button-pressed { }
.harmony-button-focus { }
.harmony-button-loading { }
.harmony-button-disabled {
  opacity: 0.4;
  pointer-events: none;
}

/* 防拉伸约束 */
.harmony-button [class*="icon"],
.harmony-button [class*="arrow"],
.harmony-button [class*="thumb"] {
  background-repeat: no-repeat;
  background-position: center;
  background-size: contain;
}
</style>

<div class="harmony-button harmony-button-{{variant}} harmony-button-{{state}}" data-component="button" data-figma-node-id="" {{disabled}}>
{{icon}}
<span class="harmony-button-label">{{label}}</span>
<span class="harmony-button-spinner" {{showSpinner}}></span>
</div>
