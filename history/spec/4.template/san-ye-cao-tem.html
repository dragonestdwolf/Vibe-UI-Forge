<!--
  san-ye-cao Template
  Source: benchmark + MCP
  Variables (Template Contract):
- `{{variant}}`: `a|b`
- `{{state}}`: `default|hover`
- `{{interactive}}`: 是否开启交互动画
- `{{leafRight}}`, `{{leafTop}}`, `{{core}}`, `{{leafLeft}}`: 四叶片资源槽
-->

<style>
:root {
  --harmony-bg-surface: rgba(255, 255, 255, 1);
  --harmony-text-primary: rgba(0, 0, 0, 0.8980392218);
  --harmony-text-secondary: rgba(0, 0, 0, 0.6000000238);
  --harmony-border: rgba(0, 0, 0, 0.08);
  --harmony-brand: rgba(10, 89, 247, 1);
  --harmony-radius-pill: 999px;
  --harmony-checkbox-size: 16px;
  --harmony-size-width: 360px;
  --harmony-size-height: 792px;
  --harmony-size-surface: rgba(241, 243, 245, 1);
  --harmony-divider-color: rgba(0, 0, 0, 0.12);
}

.harmony-san-ye-cao {
  width: 156px; height: 156px; position: relative;
  color: var(--harmony-text-primary);
  font-family: "HarmonyOS Sans SC", "HarmonyOS Sans", "Noto Sans SC", sans-serif;
  box-sizing: border-box;
}

.harmony-san-ye-cao-default { }
.harmony-san-ye-cao-hover { }
.harmony-san-ye-cao-pressed { }
.harmony-san-ye-cao-focus { }
.harmony-san-ye-cao-disabled {
  opacity: 0.4;
  pointer-events: none;
}

/* 防拉伸约束 */
.harmony-san-ye-cao [class*="icon"],
.harmony-san-ye-cao [class*="arrow"],
.harmony-san-ye-cao [class*="thumb"] {
  background-repeat: no-repeat;
  background-position: center;
  background-size: contain;
}
</style>

<div class="harmony-san-ye-cao harmony-san-ye-cao-{{variant}} harmony-san-ye-cao-{{state}}" data-component="san-ye-cao" data-figma-node-id="" data-interactive="{{interactive}}">
<span class="harmony-clover-leaf-right">{{leafRight}}</span>
<span class="harmony-clover-leaf-top">{{leafTop}}</span>
<span class="harmony-clover-core">{{core}}</span>
<span class="harmony-clover-leaf-left">{{leafLeft}}</span>
</div>
