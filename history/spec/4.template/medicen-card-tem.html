<!--
  medicen-card Template
  Source: benchmark + MCP
  Variables (Template Contract):
- `{{status}}`: `done|pending|disabled`
- `{{time}}`, `{{drugName}}`, `{{drugDesc}}`, `{{recordTime}}`
- `{{state}}`: `default|hover|pressed|focus`
-->

<style>
:root {
  --harmony-bg-surface: rgba(255, 255, 255, 1);
  --harmony-text-primary: rgba(0, 0, 0, 0.8980392218);
  --harmony-text-secondary: rgba(0, 0, 0, 0.6000000238);
  --harmony-border: rgba(0, 0, 0, 0.08);
  --harmony-brand: rgba(10, 89, 247, 1);
  --harmony-radius-pill: 999px;
  --harmony-checkbox-size: 16px;
  --harmony-size-width: 360px;
  --harmony-size-height: 792px;
  --harmony-size-surface: rgba(241, 243, 245, 1);
  --harmony-divider-color: rgba(0, 0, 0, 0.12);
}

.harmony-medicen-card {
  width: 328px; border-radius: 20px; padding: 14px 0 4px; display: flex; flex-direction: column; gap: 12px;
  color: var(--harmony-text-primary);
  font-family: "HarmonyOS Sans SC", "HarmonyOS Sans", "Noto Sans SC", sans-serif;
  box-sizing: border-box;
}

.harmony-medicen-card-default { }
.harmony-medicen-card-hover { }
.harmony-medicen-card-pressed { }
.harmony-medicen-card-focus { }
.harmony-medicen-card-disabled {
  opacity: 0.4;
  pointer-events: none;
}

/* 防拉伸约束 */
.harmony-medicen-card [class*="icon"],
.harmony-medicen-card [class*="arrow"],
.harmony-medicen-card [class*="thumb"] {
  background-repeat: no-repeat;
  background-position: center;
  background-size: contain;
}
</style>

<div class="harmony-medicen-card harmony-medicen-card-{{status}} harmony-medicen-card-{{state}}" data-component="medicen-card" data-figma-node-id="">
<header class="harmony-medicen-card-head">
  <time class="harmony-medicen-card-time">{{time}}</time>
  <span class="harmony-medicen-card-status">{{status}}</span>
</header>
<div class="harmony-medicen-card-body">
  <div class="harmony-medicen-card-drug-name">{{drugName}}</div>
  <div class="harmony-medicen-card-drug-desc">{{drugDesc}}</div>
  <div class="harmony-medicen-card-record-time">{{recordTime}}</div>
</div>
</div>
