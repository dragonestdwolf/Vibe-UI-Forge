<!--
  bottomtab Template
  Source: HarmonyOS guide + Pixso MCP
  Variables (Template Contract):
- `{{count}}`: `2|3|4|5`
- `{{land}}`: `off|on`
- `{{items}}`: 页签项插槽，插入后的子节点必须使用 `.harmony-bottomtab-item` 语义结构
- `{{safeArea}}`: 底部安全区/系统导航条占位插槽
-->

<style>
.harmony-bottomtab {
  width: 360px;
  color: var(--harmony-font_primary);
  font-family: "HarmonyOS Sans SC", "HarmonyOS Sans", "Noto Sans SC", sans-serif;
  box-sizing: border-box;
}

.harmony-bottomtab-surface {
  display: flex;
  flex-direction: column;
  width: 100%;
  background: var(--harmony-comp_background_primary);
}

.harmony-bottomtab-content {
  display: flex;
  width: 100%;
}

.harmony-bottomtab-safe-area {
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-sizing: border-box;
}

.harmony-bottomtab-item {
  appearance: none;
  border: 0;
  margin: 0;
  background: transparent;
  color: var(--harmony-font_secondary);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 2px;
  min-width: 0;
  cursor: pointer;
  box-sizing: border-box;
}

.harmony-bottomtab-item:disabled,
.harmony-bottomtab-item[aria-disabled="true"] {
  opacity: 0.4;
  pointer-events: none;
}

.harmony-bottomtab-item-activated,
.harmony-bottomtab-item[aria-current="page"] {
  color: var(--harmony-font_emphasize);
}

.harmony-bottomtab-item-icon {
  width: 24px;
  height: 24px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex: 0 0 auto;
  color: var(--harmony-icon_secondary);
}

.harmony-bottomtab-item-activated .harmony-bottomtab-item-icon,
.harmony-bottomtab-item[aria-current="page"] .harmony-bottomtab-item-icon {
  color: var(--harmony-icon_emphasize);
}

.harmony-bottomtab-item-label {
  min-width: 0;
  font-size: 10px;
  font-weight: 500;
  line-height: 11px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.harmony-bottomtab-land-off .harmony-bottomtab-content {
  min-height: 45px;
}

.harmony-bottomtab-land-off .harmony-bottomtab-item {
  min-height: 45px;
  flex-direction: column;
  padding: 4px;
}

.harmony-bottomtab-land-on .harmony-bottomtab-content {
  min-height: 40px;
}

.harmony-bottomtab-land-on .harmony-bottomtab-item {
  min-height: 40px;
  flex-direction: row;
  gap: 8px;
  padding: 8px;
}

.harmony-bottomtab-count-2 .harmony-bottomtab-content > .harmony-bottomtab-item {
  width: 180px;
}

.harmony-bottomtab-count-3 .harmony-bottomtab-content > .harmony-bottomtab-item {
  width: 120px;
}

.harmony-bottomtab-count-4 .harmony-bottomtab-content > .harmony-bottomtab-item {
  width: 90px;
}

.harmony-bottomtab-count-5 .harmony-bottomtab-content > .harmony-bottomtab-item {
  width: 72px;
}

/* 防拉伸约束 */
.harmony-bottomtab [class*="icon"],
.harmony-bottomtab [class*="arrow"],
.harmony-bottomtab [class*="thumb"] {
  background-repeat: no-repeat;
  background-position: center;
  background-size: contain;
}
</style>

<nav class="harmony-bottomtab harmony-bottomtab-count-{{count}} harmony-bottomtab-land-{{land}}" data-component="bottomtab" data-figma-node-id="66:20967" aria-label="Bottom Tab Navigation">
<div class="harmony-bottomtab-surface">
  <div class="harmony-bottomtab-content">
    {{items}}
  </div>
  <div class="harmony-bottomtab-safe-area">{{safeArea}}</div>
</div>
</nav>
