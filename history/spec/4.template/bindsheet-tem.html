<!--
  bindsheet Template
  Source: benchmark + MCP
  Variables (Template Contract):
- `{{state}}`: `expanded|half|collapsed`
- `{{title}}`, `{{content}}`
- `{{draggable}}`: 是否允许拖拽
- `{{showMask}}`: 是否显示遮罩
-->

<style>
.harmony-bindsheet {
  width: 360px;
  height: 792px;
  position: absolute;
  inset: 0;
  overflow: hidden;
  color: var(--harmony-font_primary);
  font-family: "HarmonyOS Sans SC", "HarmonyOS Sans", "Noto Sans SC", sans-serif;
  box-sizing: border-box;
  z-index: 10;
}

.harmony-bindsheet-mask {
  position: absolute;
  inset: 0;
  width: 360px;
  height: 792px;
  background: rgba(0, 0, 0, 0.2);
}

.harmony-bindsheet-sheet {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
}

/* 防拉伸约束 */
.harmony-bindsheet [class*="icon"],
.harmony-bindsheet [class*="arrow"],
.harmony-bindsheet [class*="thumb"] {
  background-repeat: no-repeat;
  background-position: center;
  background-size: contain;
}
</style>

<div class="harmony-bindsheet harmony-bindsheet-{{state}}" data-component="bindsheet" data-figma-node-id="" data-draggable="{{draggable}}">
<div class="harmony-bindsheet-mask" {{showMask}}></div>
<div class="harmony-bindsheet-sheet harmony-bindsheet-sheet-{{state}}">
  <div class="harmony-bindsheet-handle"></div>
  <header class="harmony-bindsheet-header">{{title}}</header>
  <div class="harmony-bindsheet-content">{{content}}</div>
</div>
</div>
