<!--
  checkbox Template
  Source: benchmark + MCP
  Variables (Template Contract):
- `{{size}}`: `sm|md`
- `{{checked}}`: `true|false`
- `{{state}}`: `enabled|hover|pressed|focus|disabled`
- `{{disabled}}`: disabled attribute
-->

<style>
.harmony-checkbox {
  width: 16px;
  height: 16px;
  position: relative;
  border-radius: 4px;
  color: var(--harmony-font_primary);
  font-family: "HarmonyOS Sans SC", "HarmonyOS Sans", "Noto Sans SC", sans-serif;
  box-sizing: border-box;
}

.harmony-checkbox-sm { width: 16px; height: 16px; }
.harmony-checkbox-md { width: 24px; height: 24px; }
.harmony-checkbox-enabled { }
.harmony-checkbox-hover { }
.harmony-checkbox-pressed { }
.harmony-checkbox-focus-state { }
.harmony-checkbox-disabled {
  opacity: 0.4;
  pointer-events: none;
}

/* 防拉伸约束 */
.harmony-checkbox [class*="icon"],
.harmony-checkbox [class*="arrow"],
.harmony-checkbox [class*="thumb"] {
  background-repeat: no-repeat;
  background-position: center;
  background-size: contain;
}
</style>

<div class="harmony-checkbox harmony-checkbox-{{size}} harmony-checkbox-{{state}}" data-component="checkbox" data-figma-node-id="" aria-checked="{{checked}}" {{disabled}}>
<span class="harmony-checkbox-inner"></span>
<span class="harmony-checkbox-check"></span>
<span class="harmony-checkbox-focus-ring"></span>
</div>
