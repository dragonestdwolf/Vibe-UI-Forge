<!--
  titlebar Template
  Source: benchmark + MCP
  Variables (Template Contract):
- `{{title}}`: 标题文本
- `{{leftIcon}}`: 左侧图标
- `{{rightIcon}}`: 右侧图标
- `{{state}}`: `default|hover|pressed|focus|disabled`
-->

<style>
:root {
  --harmony-bg-surface: rgba(255, 255, 255, 1);
  --harmony-text-primary: rgba(0, 0, 0, 0.8980392218);
  --harmony-text-secondary: rgba(0, 0, 0, 0.6000000238);
  --harmony-border: rgba(0, 0, 0, 0.08);
  --harmony-brand: rgba(10, 89, 247, 1);
  --harmony-radius-pill: 999px;
  --harmony-checkbox-size: 16px;
  --harmony-size-width: 360px;
  --harmony-size-height: 792px;
  --harmony-size-surface: rgba(241, 243, 245, 1);
  --harmony-divider-color: rgba(0, 0, 0, 0.12);
}

.harmony-titlebar {
  width: 328px;
  height: 56px;
  display: grid;
  grid-template-columns: 40px minmax(0, 1fr) 40px;
  align-items: center;
  column-gap: 8px;
  color: var(--harmony-text-primary);
  font-family: "HarmonyOS Sans SC", "HarmonyOS Sans", "Noto Sans SC", sans-serif;
  box-sizing: border-box;
}

.harmony-titlebar-default { }
.harmony-titlebar-hover { }
.harmony-titlebar-pressed { }
.harmony-titlebar-focus { }
.harmony-titlebar-disabled {
  opacity: 0.4;
  pointer-events: none;
}

.harmony-titlebar-back,
.harmony-titlebar-action {
  width: 40px;
  height: 40px;
  border: 0;
  border-radius: 999px;
  background: transparent;
  padding: 0;
}

.harmony-titlebar-title {
  margin: 0;
  text-align: center;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* 防拉伸约束 */
.harmony-titlebar [class*="icon"],
.harmony-titlebar [class*="arrow"],
.harmony-titlebar [class*="thumb"] {
  background-repeat: no-repeat;
  background-position: center;
  background-size: contain;
}
</style>

<div class="harmony-titlebar harmony-titlebar-{{state}}" data-component="titlebar" data-figma-node-id="">
<button class="harmony-titlebar-back" type="button">{{leftIcon}}</button>
<h3 class="harmony-titlebar-title">{{title}}</h3>
<button class="harmony-titlebar-action" type="button">{{rightIcon}}</button>
</div>
