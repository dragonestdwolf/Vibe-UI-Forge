<!--
  public Template
  Source: benchmark + MCP
  Variables (Template Contract):
- `{{theme}}`: `light|dark`
- `{{time}}`: 时间文本
- `{{wifiIcon}}`: WiFi 图标资源
- `{{singleCardIcon}}`: 单卡图标资源
- `{{dualCardIcon}}`: 双卡图标资源
- `{{batteryIcon}}`: 电池图标资源
-->

<style>
.harmony-public {
  width: 360px;
  height: 36px;
  padding: 8px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: var(--harmony-font_primary);
  font-family: "HarmonyOS Sans SC", "HarmonyOS Sans", "Noto Sans SC", sans-serif;
  box-sizing: border-box;
}

.harmony-public-time {
  width: 40px;
  min-width: 40px;
  font-size: 15px;
  line-height: 20px;
  font-weight: 500;
  white-space: nowrap;
}

.harmony-public-icons {
  width: 96px;
  height: 13px;
  position: relative;
  flex: 0 0 auto;
}

.harmony-public-icon {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  display: block;
}

.harmony-public-icon-wifi {
  left: 0.401px;
  top: calc(50% + 0.296px);
  width: 15.344px;
  height: 12.001px;
}

.harmony-public-icon-single-card {
  left: 21.398px;
  top: calc(50% + 0.297px);
  width: 21.5px;
  height: 12px;
}

.harmony-public-icon-dual-card {
  left: 47.398px;
  top: calc(50% + 0.297px);
  width: 17.5px;
  height: 12px;
}

.harmony-public-icon-battery {
  left: 70.25px;
  top: 50%;
  width: 25.75px;
  height: 13px;
}

/* 防拉伸约束 */
.harmony-public [class*="icon"],
.harmony-public [class*="arrow"],
.harmony-public [class*="thumb"] {
  background-repeat: no-repeat;
  background-position: center;
  background-size: contain;
}
</style>

<div class="harmony-public harmony-public-{{theme}}" data-component="public" data-figma-node-id="">
<span class="harmony-public-time">{{time}}</span>
<span class="harmony-public-icons">
  <i class="harmony-public-icon harmony-public-icon-wifi">{{wifiIcon}}</i>
  <i class="harmony-public-icon harmony-public-icon-single-card">{{singleCardIcon}}</i>
  <i class="harmony-public-icon harmony-public-icon-dual-card">{{dualCardIcon}}</i>
  <i class="harmony-public-icon harmony-public-icon-battery">{{batteryIcon}}</i>
</span>
</div>
