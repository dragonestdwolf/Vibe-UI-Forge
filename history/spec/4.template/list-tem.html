<!--
  list Template
  Source: benchmark + MCP
  Variables (Template Contract):
- `{{itemType}}`: `single|double|triple|avatar`
- `{{state}}`: `default|hover|selected|disabled`
- `{{title}}`, `{{subtitle}}`, `{{extra}}`, `{{icon}}`
-->

<style>
.harmony-list {
  width: 328px;
  display: flex;
  flex-direction: column;
  border-radius: 14px;
  overflow: hidden;
  color: var(--harmony-font_primary);
  font-family: "HarmonyOS Sans SC", "HarmonyOS Sans", "Noto Sans SC", sans-serif;
  box-sizing: border-box;
}

.harmony-list-default { }
.harmony-list-hover { }
.harmony-list-disabled {
  opacity: 0.4;
  pointer-events: none;
}

/* 防拉伸约束 */
.harmony-list [class*="icon"],
.harmony-list [class*="arrow"],
.harmony-list [class*="thumb"] {
  background-repeat: no-repeat;
  background-position: center;
  background-size: contain;
}

.harmony-list-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  min-height: 56px;
  padding: 12px;
}

.harmony-list-leading {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}

.harmony-list-copy {
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.harmony-list-title,
.harmony-list-subtitle,
.harmony-list-extra {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.harmony-list-trailing {
  min-width: 68px;
  text-align: right;
  white-space: nowrap;
}
</style>

<div class="harmony-list harmony-list-{{state}}" data-component="list" data-figma-node-id="">
<div class="harmony-list-item harmony-list-item-{{itemType}} harmony-list-item-{{state}}">
  <div class="harmony-list-leading">
    <span class="harmony-list-icon">{{icon}}</span>
    <div class="harmony-list-copy">
      <span class="harmony-list-title">{{title}}</span>
      <span class="harmony-list-subtitle">{{subtitle}}</span>
    </div>
  </div>
  <span class="harmony-list-trailing">{{extra}}</span>
</div>
</div>
