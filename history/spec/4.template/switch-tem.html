<!--
  switch Template
  Source: benchmark + MCP
  Variables (Template Contract):
- `{{checked}}`: `true|false`
- `{{state}}`: `enabled|hover|pressed|focus|disabled`
- `{{disabled}}`: disabled attribute
-->

<style>
.harmony-switch {
  width: 36px;
  height: 20px;
  border: 0;
  border-radius: 10px;
  padding: 0;
  position: relative;
  appearance: none;
  -webkit-appearance: none;
  background: transparent;
  color: var(--harmony-font_primary);
  font-family: "HarmonyOS Sans SC", "HarmonyOS Sans", "Noto Sans SC", sans-serif;
  box-sizing: border-box;
}

.harmony-switch-enabled { }
.harmony-switch-hover { }
.harmony-switch-pressed { }
.harmony-switch-focus { }
.harmony-switch-disabled {
  opacity: 0.4;
  pointer-events: none;
}

/* 防拉伸约束 */
.harmony-switch [class*="icon"],
.harmony-switch [class*="arrow"],
.harmony-switch [class*="thumb"] {
  background-repeat: no-repeat;
  background-position: center;
  background-size: contain;
}
</style>

<div class="harmony-switch harmony-switch-{{state}}" data-component="switch" data-figma-node-id="" aria-checked="{{checked}}" {{disabled}}>
<span class="harmony-switch-track"></span>
<span class="harmony-switch-thumb"></span>
</div>
